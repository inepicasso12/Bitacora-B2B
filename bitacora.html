function renderTable(filteredData) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  
  if (filteredData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-light);">No hay datos que coincidan con los filtros seleccionados</td></tr>';
    return;
  }
  
  filteredData.forEach(entry => {
    const row = document.createElement('tr');
    const typeColor = {
      'problema': 'badge-problema',
      'impacto': 'badge-impacto',
      'insight': 'badge-insight',
      'accion': 'badge-accion'
    }[entry.type] || '';
    
    row.innerHTML = `
      <td>${entry.date}</td>
      <td>${entry.client}</td>
      <td><span class="badge ${typeColor}">${entry.type}</span></td>
      <td><strong>${entry.title}</strong></td>
      <td>${entry.summary.substring(0, 60)}...</td>
      <td>${entry.author}</td>
    `;
    tbody.appendChild(row);
  });
}

function updateStats(filteredData) {
  const total = filteredData.length;
  const clients = new Set(filteredData.map(e => e.client)).size;
  const problemas = filteredData.filter(e => e.type === 'problema').length;
  const impactos = filteredData.filter(e => e.type === 'impacto').length;
  const insights = filteredData.filter(e => e.type === 'insight').length;
  const acciones = filteredData.filter(e => e.type === 'accion').length;
  
  document.getElementById('totalRegistros').textContent = total;
  document.getElementById('totalClientes').textContent = clients;
  document.getElementById('totalProblemas').textContent = problemas;
  document.getElementById('totalImpactos').textContent = impactos;
  document.getElementById('totalInsights').textContent = insights;
  document.getElementById('totalAcciones').textContent = acciones;
}

function applyFilters() {
  const monthFilter = document.getElementById('filterMonth').value;
  const clientFilter = document.getElementById('filterClient').value;
  const typeFilter = document.getElementById('filterType').value;
  
  let filtered = allData;
  
  if (monthFilter) {
    filtered = filtered.filter(e => e.date.startsWith(monthFilter));
  }
  if (clientFilter) {
    filtered = filtered.filter(e => e.client === clientFilter);
  }
  if (typeFilter) {
    filtered = filtered.filter(e => e.type === typeFilter);
  }
  
  // Ordenar por fecha descendente
  filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
  
  renderTable(filtered);
  updateStats(filtered);
}

// Inicializar
window.addEventListener('load', () => {
  applyFilters();
});
